<div class="carousel-wrap">
  <button class="carousel-arrow carousel-prev" (click)="prev()" aria-label="Slide anterior">←</button>
  <button class="carousel-arrow carousel-next" (click)="next()" aria-label="Próximo slide">→</button>

  <div class="carousel-track-outer">
    <div class="carousel-track" [style.transform]="'translateX(-' + (current() * 100) + '%)'">
      @for (slide of slides(); track slide.titulo) {
        <div class="carousel-slide">
          <div class="slide-bg" [style.background]="slide.gradiente">{{ slide.emoji }}</div>
          <div class="slide-overlay"></div>
          <div class="slide-content">
            <span class="slide-badge">{{ slide.badge }}</span>
            <div class="slide-title">{{ slide.titulo }}</div>
            <div class="slide-meta">{{ slide.meta }}</div>
            <button class="slide-btn">{{ slide.ctaLabel }}</button>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="carousel-dots">
    @for (slide of slides(); track slide.titulo; let i = $index) {
      <div class="dot" [class.active]="i === current()" (click)="goTo(i)"></div>
    }
  </div>
</div>
